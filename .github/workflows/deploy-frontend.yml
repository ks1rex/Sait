name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Debug – show commit and problematic lines
        run: |
          git log --oneline -3
          echo "=== api.ts lines 10-18 ==="
          sed -n '10,18p' frontend/src/lib/api.ts
          echo "=== AdminPage.tsx line 7 ==="
          sed -n '7p' frontend/src/pages/AdminPage.tsx

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_BASE_PATH: /Sait/
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Copy index.html as 404.html for SPA routing
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
